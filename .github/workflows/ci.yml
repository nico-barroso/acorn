name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            apps/mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm ci

      - name: Lint mobile app
        working-directory: apps/mobile
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            apps/mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm ci

      - name: Type-check mobile app
        working-directory: apps/mobile
        run: npx tsc --noEmit
